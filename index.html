<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Dungeon</title>
    <style>
        body {
            font-family: monospace;
            background-color: #111;
            color: #eee;
            padding: 20px;
        }
        #output {
            white-space: pre-line;
            margin-bottom: 10px;
        }
        input {
            background-color: #222;
            color: #eee;
            border: none;
            padding: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div id="output">Welcome to the dungeon! Type a command to begin.</div>
    <input id="command" placeholder="Enter command" autofocus />
    <script src="script.js"></script>
</body>
</html>
